<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toxic Ludo</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --red: #e63946;
  --blue: #2196F3;
  --green: #4CAF50;
  --yellow: #FFD600;
  --bg: #0b0b12;
  --surface: #13131f;
  --surface2: #1c1c2e;
  --text: #eeeef5;
  --accent: #7c4dff;
  --bs: calc(min(95vw, 95vh, 560px));
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:var(--bg); color:var(--text);
  font-family:'Rajdhani',sans-serif; overflow:hidden; user-select:none; }

/* ─── SCREENS ─── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; transition:opacity .35s, transform .35s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.96); }

/* ─── LOBBY ─── */
#sLobby {
  background: radial-gradient(ellipse at 50% -10%, #1e0a3c 0%, var(--bg) 65%);
  gap:28px; padding:24px;
}
.logo { font-family:'Orbitron',monospace; font-size:clamp(44px,12vw,80px); font-weight:900;
  letter-spacing:.12em;
  background:linear-gradient(135deg,#FFD700 0%,#FF9100 50%,#e63946 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 28px rgba(255,160,0,.45));
  animation:logoPulse 3s ease-in-out infinite; }
@keyframes logoPulse { 0%,100%{filter:drop-shadow(0 0 18px rgba(255,160,0,.35))}
  50%{filter:drop-shadow(0 0 40px rgba(255,160,0,.7))} }
.logo-sub { font-size:11px; letter-spacing:.4em; color:rgba(255,255,255,.35);
  text-transform:uppercase; margin-top:-20px; }

.section-label { font-size:12px; letter-spacing:.3em; color:rgba(255,255,255,.45);
  text-transform:uppercase; }

.pill-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

.pill { padding:11px 22px; border-radius:50px; border:1.5px solid rgba(255,255,255,.1);
  background:var(--surface2); color:rgba(255,255,255,.6);
  font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600;
  letter-spacing:.1em; cursor:pointer; transition:all .2s cubic-bezier(.34,1.56,.64,1);
  text-transform:uppercase; }
.pill.active { border-color:#FFD700; color:#FFD700;
  background:rgba(255,215,0,.08); box-shadow:0 0 20px rgba(255,215,0,.18); }
.pill:active { transform:scale(.94); }

.num-row { display:flex; gap:12px; }
.nbox { width:68px; height:68px; border-radius:18px;
  border:2px solid rgba(255,255,255,.08); background:var(--surface2);
  color:var(--text); font-family:'Orbitron',monospace; font-size:24px; font-weight:700;
  cursor:pointer; transition:all .2s cubic-bezier(.34,1.56,.64,1);
  display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.nbox::before { content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,var(--accent),#e040fb); opacity:0; transition:opacity .2s; }
.nbox span { position:relative; z-index:1; }
.nbox.active { border-color:var(--accent); transform:scale(1.08); }
.nbox.active::before { opacity:1; }

.big-btn { padding:17px 56px; border-radius:50px; border:none;
  background:linear-gradient(135deg,#7c4dff,#e040fb); color:#fff;
  font-family:'Orbitron',monospace; font-size:16px; font-weight:700;
  letter-spacing:.15em; cursor:pointer; text-transform:uppercase;
  box-shadow:0 8px 32px rgba(124,77,255,.45);
  transition:all .3s cubic-bezier(.34,1.56,.64,1); }
.big-btn:hover { transform:scale(1.05) translateY(-2px); box-shadow:0 12px 44px rgba(124,77,255,.6); }
.big-btn:active { transform:scale(.96); }
.big-btn:disabled { opacity:.4; pointer-events:none; }

/* room code display */
.room-box { background:var(--surface2); border:1.5px solid rgba(255,255,255,.08);
  border-radius:16px; padding:16px 28px; text-align:center; }
.room-code { font-family:'Orbitron',monospace; font-size:32px; font-weight:900;
  letter-spacing:.25em; color:#FFD700; }
.room-hint { font-size:11px; letter-spacing:.2em; color:rgba(255,255,255,.35);
  text-transform:uppercase; margin-top:4px; }

.join-input { background:var(--surface2); border:1.5px solid rgba(255,255,255,.12);
  border-radius:14px; padding:14px 20px; font-family:'Orbitron',monospace;
  font-size:22px; font-weight:700; letter-spacing:.3em; color:#FFD700;
  text-align:center; width:220px; outline:none; text-transform:uppercase; }
.join-input:focus { border-color:var(--accent); box-shadow:0 0 16px rgba(124,77,255,.3); }
.join-input::placeholder { color:rgba(255,255,255,.2); font-size:14px; letter-spacing:.2em; }

/* waiting room */
.waiting-slots { display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
  max-width:300px; }
.slot { padding:10px 18px; border-radius:12px; border:1.5px solid rgba(255,255,255,.08);
  background:var(--surface2); font-size:13px; font-weight:600;
  letter-spacing:.08em; display:flex; align-items:center; gap:8px; min-width:120px;
  transition:all .3s; }
.slot.filled { border-color:rgba(255,255,255,.18); }
.slot-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.2); }
.slot.filled .slot-dot { animation:slotGlow .8s ease-in-out infinite alternate; }
@keyframes slotGlow { from{box-shadow:none;} to{box-shadow:0 0 10px currentColor;} }

.spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ─── GAME SCREEN ─── */
#sGame { padding:0; background:radial-gradient(ellipse at 50% 50%,#0d0d1a 0%,#060608 100%); }

.topbar { position:fixed; top:0; left:0; right:0; height:52px;
  display:flex; align-items:center; justify-content:space-between; padding:0 16px;
  background:rgba(8,8,14,.95); backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.05); z-index:60; }
.tb-left { font-family:'Orbitron',monospace; font-size:16px; font-weight:700;
  letter-spacing:.18em;
  background:linear-gradient(90deg,#FFD700,#ff9100);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.tb-mid { display:flex; align-items:center; gap:7px; font-size:12px;
  letter-spacing:.1em; color:rgba(255,255,255,.6); }
.turn-dot { width:9px; height:9px; border-radius:50%;
  animation:tdBlink 1s ease-in-out infinite; }
@keyframes tdBlink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.tb-right { display:flex; align-items:center; gap:8px; }
.badge { padding:3px 10px; border-radius:20px; font-size:10px; letter-spacing:.18em;
  text-transform:uppercase; }
.badge-spectate { background:rgba(124,77,255,.2); border:1px solid rgba(124,77,255,.4); color:#b39ddb; }
.badge-you { background:rgba(76,175,80,.2); border:1px solid rgba(76,175,80,.4); color:#a5d6a7; }
.badge-code { background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.3); color:#FFD700;
  font-family:'Orbitron',monospace; font-size:10px; letter-spacing:.15em; cursor:pointer; }

/* Board */
.board-wrap { margin-top:52px; display:flex; align-items:center; justify-content:center;
  width:100%; height:calc(100% - 52px - 100px); }
#board { width:var(--bs); height:var(--bs); display:grid;
  grid-template-columns:repeat(15,1fr); grid-template-rows:repeat(15,1fr);
  border:2.5px solid rgba(255,255,255,.1); border-radius:14px; overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,.8),0 0 140px rgba(124,77,255,.08),inset 0 0 60px rgba(0,0,0,.4);
  position:relative; will-change:transform; }

.cell { border:.5px solid rgba(255,255,255,.04); display:flex; align-items:center;
  justify-content:center; position:relative; }
.cell.red-zone    { background:rgba(230,57,70,.18); }
.cell.blue-zone   { background:rgba(33,150,243,.18); }
.cell.green-zone  { background:rgba(76,175,80,.18); }
.cell.yellow-zone { background:rgba(255,214,0,.18); }
.cell.path        { background:rgba(255,255,255,.03); }
.cell.safe        { background:rgba(255,255,255,.07); }
.cell.safe::after { content:'★'; font-size:9px; color:rgba(255,215,0,.5); position:absolute; }
.cell.red-path    { background:rgba(230,57,70,.28); }
.cell.blue-path   { background:rgba(33,150,243,.28); }
.cell.green-path  { background:rgba(76,175,80,.28); }
.cell.yellow-path { background:rgba(255,214,0,.28); }
.cell.center-area { background:rgba(255,255,255,.02); }

/* Pieces */
.piece { width:72%; height:72%; border-radius:50%; position:absolute; cursor:pointer;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  z-index:10; display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; font-family:'Orbitron',monospace;
  will-change:transform; border:2px solid rgba(255,255,255,.28);
  top:50%; left:50%; transform:translate(-50%,-50%); }
.piece.movable { animation:mGlow .55s ease-in-out infinite alternate; cursor:pointer; }
@keyframes mGlow {
  from{box-shadow:0 0 6px currentColor,0 0 14px currentColor;transform:translate(-50%,-50%) scale(1.05);}
  to{box-shadow:0 0 14px currentColor,0 0 28px currentColor,0 0 44px currentColor;transform:translate(-50%,-50%) scale(1.18);}
}
.piece.red-p    { background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b); color:#fff; box-shadow:0 3px 10px rgba(230,57,70,.6); }
.piece.blue-p   { background:radial-gradient(circle at 35% 35%,#64b5f6,#1565c0); color:#fff; box-shadow:0 3px 10px rgba(33,150,243,.6); }
.piece.green-p  { background:radial-gradient(circle at 35% 35%,#81c784,#2e7d32); color:#fff; box-shadow:0 3px 10px rgba(76,175,80,.6); }
.piece.yellow-p { background:radial-gradient(circle at 35% 35%,#fff176,#f9a825); color:#333; box-shadow:0 3px 10px rgba(255,214,0,.6); }

/* Multiple pieces on same cell */
.piece.sm { width:42%; height:42%; font-size:7px; }

/* Dice */
.dice-bar { position:fixed; bottom:0; left:0; right:0; height:100px;
  display:flex; align-items:center; justify-content:center; gap:20px;
  background:rgba(8,8,14,.95); backdrop-filter:blur(14px);
  border-top:1px solid rgba(255,255,255,.05); z-index:60; padding:0 20px; }
#dice { width:66px; height:66px; background:linear-gradient(135deg,#1a1a2e,#252540);
  border:2px solid rgba(255,255,255,.14); border-radius:16px;
  display:flex; align-items:center; justify-content:center; font-size:34px;
  cursor:pointer; box-shadow:0 6px 28px rgba(0,0,0,.5),0 0 18px rgba(124,77,255,.18);
  transition:all .2s cubic-bezier(.34,1.56,.64,1); will-change:transform; }
#dice:hover { transform:scale(1.1) rotate(4deg); }
#dice:active { transform:scale(.9); }
#dice.rolling { animation:dRoll .5s ease; }
#dice.disabled { opacity:.4; pointer-events:none; }
@keyframes dRoll {
  0%{transform:rotate(0) scale(1)} 25%{transform:rotate(180deg) scale(.8)}
  50%{transform:rotate(360deg) scale(1.2)} 75%{transform:rotate(540deg) scale(.9)}
  100%{transform:rotate(720deg) scale(1)} }
.dice-info { display:flex; flex-direction:column; gap:4px; min-width:120px; }
.di-turn { font-size:13px; font-weight:600; letter-spacing:.08em; }
.di-hint { font-size:11px; color:rgba(255,255,255,.35); letter-spacing:.1em; text-transform:uppercase; }

/* Side panels */
.side-panels { position:fixed; right:10px; top:60px; display:flex;
  flex-direction:column; gap:6px; z-index:55; }
.pp { padding:8px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.05);
  background:rgba(10,10,18,.9); backdrop-filter:blur(8px); min-width:88px;
  transition:all .3s; }
.pp.active { border-color:var(--pc,#7c4dff); box-shadow:0 0 16px rgba(var(--pr,124,77,255),.28); }
.pp-name { font-size:10px; letter-spacing:.14em; color:rgba(255,255,255,.4);
  text-transform:uppercase; margin-bottom:3px; }
.pp-color { font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px; }
.pp-dot { width:7px; height:7px; border-radius:50%; }
.pp-you { font-size:9px; color:rgba(76,175,80,.8); letter-spacing:.1em; }

/* Toast */
.toast { position:fixed; top:64px; left:50%; transform:translateX(-50%) translateY(-16px);
  background:rgba(10,10,20,.96); border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(18px); padding:10px 22px; border-radius:50px;
  font-size:13px; font-weight:600; letter-spacing:.08em; opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1); z-index:200; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Win */
#sWin { background:rgba(0,0,0,.88); z-index:300; gap:22px; backdrop-filter:blur(14px); }
.win-title { font-family:'Orbitron',monospace; font-size:clamp(32px,10vw,68px);
  font-weight:900; animation:winBounce 1s ease-in-out infinite; }
@keyframes winBounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.win-sub { font-size:16px; letter-spacing:.2em; color:rgba(255,255,255,.5); text-transform:uppercase; }
.conf { position:fixed; width:10px; height:10px; border-radius:2px;
  animation:cFall linear forwards; pointer-events:none; z-index:299; }
@keyframes cFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

@media(max-width:420px){
  :root { --bs:96vw; }
  .side-panels { right:4px; }
  .pp { min-width:68px; padding:6px 8px; }
  #dice { width:56px; height:56px; font-size:28px; }
}
</style>
</head>
<body>

<!-- ══════════════ LOBBY ══════════════ -->
<div class="screen" id="sLobby">
  <div style="text-align:center">
    <div class="logo">LUDO</div>
    <div class="logo-sub">Elite Multiplayer</div>
  </div>

  <!-- Mode -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="section-label">Select Mode</div>
    <div class="pill-row">
      <button class="pill active" id="btnCreate" onclick="selectMode('create')">🎮 Create Room</button>
      <button class="pill" id="btnJoin" onclick="selectMode('join')">🔗 Join Room</button>
      <button class="pill" id="btnSpectate" onclick="selectMode('spectate')">👁 Spectate</button>
    </div>
  </div>

  <!-- Create options -->
  <div id="createOpts" style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="section-label">Number of Players</div>
    <div class="num-row">
      <div class="nbox" onclick="setPlayers(2)"><span>2</span></div>
      <div class="nbox active" onclick="setPlayers(3)"><span>3</span></div>
      <div class="nbox" onclick="setPlayers(4)"><span>4</span></div>
    </div>
  </div>

  <!-- Join options -->
  <div id="joinOpts" style="display:none;flex-direction:column;align-items:center;gap:10px">
    <div class="section-label">Enter Room Code</div>
    <input class="join-input" id="joinCode" maxlength="6" placeholder="ABC123" oninput="this.value=this.value.toUpperCase()">
  </div>

  <button class="big-btn" id="mainBtn" onclick="handleMainBtn()">▶ START</button>

  <!-- Connection status -->
  <div style="font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.15em" id="connStatus">Connecting...</div>
</div>

<!-- ══════════════ WAITING ══════════════ -->
<div class="screen hidden" id="sWait">
  <div style="text-align:center;display:flex;flex-direction:column;gap:6px">
    <div style="font-family:'Orbitron',monospace;font-size:20px;font-weight:700;letter-spacing:.15em">WAITING ROOM</div>
    <div style="font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.35);text-transform:uppercase">Share code with friends</div>
  </div>
  <div class="room-box">
    <div class="room-code" id="displayCode">------</div>
    <div class="room-hint">Room Code — Tap to copy</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%">
    <div class="section-label" id="waitLabel">Players (1/3)</div>
    <div class="waiting-slots" id="waitSlots"></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.4);font-size:13px">
    <div class="spinner"></div>
    <span id="waitHint">Waiting for players...</span>
  </div>
  <button class="big-btn" id="btnStartGame" style="display:none" onclick="hostStartGame()">▶ START GAME NOW</button>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div class="screen hidden" id="sGame">
  <div class="topbar">
    <div class="tb-left">LUDO</div>
    <div class="tb-mid">
      <div class="turn-dot" id="turnDot"></div>
      <span id="turnText">—</span>
    </div>
    <div class="tb-right">
      <div class="badge badge-code" id="tbCode" onclick="copyCode()"></div>
      <div class="badge badge-you" id="tbYou" style="display:none">YOU</div>
      <div class="badge badge-spectate" id="tbSpec" style="display:none">SPECTATING</div>
    </div>
  </div>
  <div class="board-wrap"><div id="board"></div></div>
  <div class="dice-bar">
    <div id="dice" onclick="rollDice()">⚀</div>
    <div class="dice-info">
      <div class="di-turn" id="diTurn">—</div>
      <div class="di-hint" id="diHint">Tap to roll</div>
    </div>
  </div>
  <div class="side-panels" id="sidePanels"></div>
</div>

<!-- ══════════════ WIN ══════════════ -->
<div class="screen hidden" id="sWin">
  <div class="win-title" id="winTitle">🎉 WIN!</div>
  <div class="win-sub">Champion of the Board</div>
  <button class="big-btn" onclick="location.reload()">Play Again</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  CONFIG — change SERVER_URL after deploy
// ══════════════════════════════════════
const SERVER_URL = 'wss://ludo-2u79.onrender.com'; // e.g. wss://ludo.onrender.com

const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
const COLORS     = ['red','blue','green','yellow'];
const CNAME      = {red:'Red',blue:'Blue',green:'Green',yellow:'Yellow'};
const CCSS       = {red:'#e63946',blue:'#2196F3',green:'#4CAF50',yellow:'#FFD600'};
const CRGB       = {red:'230,57,70',blue:'33,150,243',green:'76,175,80',yellow:'255,214,0'};
const CCLASS     = {red:'red-p',blue:'blue-p',green:'green-p',yellow:'yellow-p'};

// ── Ludo path (15×15 grid, 0-indexed)
const PATH = [
  [6,1],[6,2],[6,3],[6,4],[6,5],
  [5,6],[4,6],[3,6],[2,6],[1,6],[0,6],[0,7],
  [0,8],[1,8],[2,8],[3,8],[4,8],[5,8],
  [6,9],[6,10],[6,11],[6,12],[6,13],[6,14],[7,14],
  [8,14],[8,13],[8,12],[8,11],[8,10],[8,9],
  [9,8],[10,8],[11,8],[12,8],[13,8],[14,8],[14,7],
  [14,6],[13,6],[12,6],[11,6],[10,6],[9,6],
  [8,5],[8,4],[8,3],[8,2],[8,1],[8,0],[7,0]
];
const HOME_STRETCH = {
  red:   [[6,1],[6,2],[6,3],[6,4],[6,5],[7,6]],
  blue:  [[1,8],[2,8],[3,8],[4,8],[5,8],[6,7]],
  green: [[8,13],[8,12],[8,11],[8,10],[8,9],[7,8]],
  yellow:[[13,6],[12,6],[11,6],[10,6],[9,6],[8,7]],
};
const SPAWN = {
  red:   [[1,1],[1,4],[4,1],[4,4]],
  blue:  [[1,10],[1,13],[4,10],[4,13]],
  green: [[10,10],[10,13],[13,10],[13,13]],
  yellow:[[10,1],[10,4],[13,1],[13,4]],
};
const START_IDX  = {red:0,blue:13,green:26,yellow:39};
const SAFE_IDXS  = new Set([0,8,13,21,26,34,39,47]);
const HOME_ENTRY = {red:50,blue:11,green:24,yellow:37}; // path idx just before home stretch

// ── State
let ws, myId, myColor, myRole='player';
let roomCode='', numPlayers=3, mode='create';
let gameState=null; // authoritative state from server
let boardBuilt=false;

// ── Telegram WebApp init
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#0b0b12'); tg.setBackgroundColor('#0b0b12'); }

// ══════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════
function connectWS(){
  try {
    ws = new WebSocket(SERVER_URL);
    ws.onopen = ()=>{ setConnStatus('●  Connected','#4CAF50'); };
    ws.onclose= ()=>{ setConnStatus('○  Disconnected','#e63946'); setTimeout(connectWS,3000); };
    ws.onerror= ()=>{ setConnStatus('○  Connection error','#e63946'); };
    ws.onmessage = e => handleMsg(JSON.parse(e.data));
  } catch(err){ setConnStatus('○  Server unreachable','#e63946'); }
}

function send(obj){ if(ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }

function handleMsg(msg){
  switch(msg.type){
    case 'welcome':      myId=msg.id; break;
    case 'room_created': onRoomCreated(msg); break;
    case 'room_joined':  onRoomJoined(msg); break;
    case 'player_joined':onPlayerJoined(msg); break;
    case 'game_start':   onGameStart(msg); break;
    case 'game_state':   onGameState(msg); break;
    case 'error':        showToast('⚠ '+msg.message); break;
  }
}

function setConnStatus(t,c){
  const el=document.getElementById('connStatus');
  el.textContent=t; el.style.color=c;
}

// ══════════════════════════════════════
//  Lobby UI
// ══════════════════════════════════════
function selectMode(m){
  mode=m;
  ['create','join','spectate'].forEach(x=>{
    document.getElementById('btn'+x.charAt(0).toUpperCase()+x.slice(1))
      .classList.toggle('active',x===m);
  });
  document.getElementById('createOpts').style.display = m==='create'?'flex':'none';
  document.getElementById('joinOpts').style.display   = m==='join'||m==='spectate'?'flex':'none';
  document.getElementById('mainBtn').textContent =
    m==='create'?'▶ CREATE ROOM': m==='join'?'▶ JOIN ROOM':'👁 SPECTATE';
}

function setPlayers(n){
  numPlayers=n;
  document.querySelectorAll('.nbox').forEach((b,i)=>b.classList.toggle('active',i+2===n));
}

function handleMainBtn(){
  if(!ws||ws.readyState!==1){ showToast('Not connected to server'); return; }
  const tgUser = tg?.initDataUnsafe?.user;
  const userName = tgUser ? (tgUser.first_name||'Player') : 'Player'+Math.floor(Math.random()*1000);
  if(mode==='create'){
    send({type:'create_room', players:numPlayers, name:userName});
  } else if(mode==='join'){
    const code=document.getElementById('joinCode').value.trim();
    if(!code){ showToast('Enter room code!'); return; }
    myRole='player';
    send({type:'join_room', code, name:userName});
  } else {
    const code=document.getElementById('joinCode').value.trim();
    if(!code){ showToast('Enter room code to spectate!'); return; }
    myRole='spectate';
    send({type:'join_room', code, name:userName, spectate:true});
  }
}

// ══════════════════════════════════════
//  Room events
// ══════════════════════════════════════
function onRoomCreated(msg){
  roomCode=msg.code; myColor=msg.color; myRole='host';
  document.getElementById('displayCode').textContent=roomCode;
  document.getElementById('displayCode').onclick=copyCode;
  showScreen('sWait');
  renderWaitSlots(msg.players, msg.max);
}

function onRoomJoined(msg){
  roomCode=msg.code; myColor=msg.color||null;
  showScreen('sWait');
  document.getElementById('displayCode').textContent=roomCode;
  renderWaitSlots(msg.players, msg.max);
  if(myRole==='spectate'){
    document.getElementById('waitHint').textContent='Spectating — waiting for game to start...';
  }
}

function onPlayerJoined(msg){
  renderWaitSlots(msg.players, msg.max);
  showToast(`${msg.name} joined!`);
  if(myRole==='host' && msg.players.length >= 2){
    document.getElementById('btnStartGame').style.display='block';
    document.getElementById('waitHint').textContent='All set! You can start now.';
  }
}

function renderWaitSlots(players, max){
  const wrap=document.getElementById('waitSlots');
  wrap.innerHTML='';
  document.getElementById('waitLabel').textContent=`Players (${players.length}/${max})`;
  const colorAssign=['red','blue','green','yellow'];
  for(let i=0;i<max;i++){
    const p=players[i];
    const div=document.createElement('div');
    div.className='slot'+(p?' filled':'');
    const col=colorAssign[i];
    const dot=document.createElement('div');
    dot.className='slot-dot';
    if(p){ dot.style.background=CCSS[col]; dot.style.color=CCSS[col]; }
    div.appendChild(dot);
    div.appendChild(Object.assign(document.createElement('span'),{
      textContent: p ? p.name+(p.id===myId?' (You)':'') : 'Waiting...',
      style:`font-size:12px;color:${p?'rgba(255,255,255,.8)':'rgba(255,255,255,.25)'}`
    }));
    wrap.appendChild(div);
  }
}

function hostStartGame(){
  send({type:'start_game', code:roomCode});
}

function onGameStart(msg){
  gameState=msg.state;
  myColor=msg.colorMap?.[myId]||null;
  buildBoard();
  buildSidePanels();
  showScreen('sGame');
  // Set top-bar
  document.getElementById('tbCode').textContent=roomCode;
  if(myRole==='spectate'){
    document.getElementById('tbSpec').style.display='flex';
    document.getElementById('dice').classList.add('disabled');
  } else if(myColor){
    document.getElementById('tbYou').style.display='flex';
    document.getElementById('tbYou').textContent=CNAME[myColor];
    document.getElementById('tbYou').style.borderColor=CCSS[myColor];
    document.getElementById('tbYou').style.color=CCSS[myColor];
  }
  renderGameState();
}

function onGameState(msg){
  gameState=msg.state;
  renderGameState();
}

// ══════════════════════════════════════
//  Board Builder (runs once)
// ══════════════════════════════════════
function buildBoard(){
  if(boardBuilt)return; boardBuilt=true;
  const board=document.getElementById('board');
  board.innerHTML='';
  const cells=[];
  for(let r=0;r<15;r++){
    cells[r]=[];
    for(let c=0;c<15;c++){
      const el=document.createElement('div');
      el.className='cell';
      el.id=`c${r}_${c}`;
      cells[r][c]=el;
      board.appendChild(el);
    }
  }
  const activeCols=gameState.activePlayers;
  // Zones
  const zones={red:[[0,0],[0,5],[5,0],[5,5]],blue:[[0,9],[0,14],[5,9],[5,14]],
    green:[[9,9],[9,14],[14,9],[14,14]],yellow:[[9,0],[9,5],[14,0],[14,5]]};
  for(let r=0;r<6;r++) for(let c=0;c<6;c++)   cells[r][c].className='cell red-zone';
  for(let r=0;r<6;r++) for(let c=9;c<15;c++)  cells[r][c].className='cell blue-zone';
  for(let r=9;r<15;r++) for(let c=9;c<15;c++) cells[r][c].className='cell green-zone';
  for(let r=9;r<15;r++) for(let c=0;c<6;c++)  cells[r][c].className='cell yellow-zone';
  for(let r=6;r<9;r++) for(let c=6;c<9;c++)   cells[r][c].className='cell center-area';
  // Gray inactive
  COLORS.forEach(col=>{
    if(!activeCols.includes(col)){
      const map={red:[[0,0,6,6]],blue:[[0,9,6,15]],green:[[9,9,15,15]],yellow:[[9,0,15,6]]};
      map[col].forEach(([r1,c1,r2,c2])=>{
        for(let r=r1;r<r2;r++) for(let c=c1;c<c2;c++){
          cells[r][c].style.background='rgba(255,255,255,.015)';
          cells[r][c].style.filter='grayscale(1)';
        }
      });
    }
  });
  // Path
  PATH.forEach((p,i)=>{
    const cl=cells[p[0]][p[1]];
    cl.className='cell path';
    if(SAFE_IDXS.has(i)) cl.classList.add('safe');
  });
  // Home stretches
  const hsColors={red:'red-path',blue:'blue-path',green:'green-path',yellow:'yellow-path'};
  Object.entries(HOME_STRETCH).forEach(([col,pts])=>{
    pts.slice(0,-1).forEach(([r,c])=>{ cells[r][c].className=`cell ${hsColors[col]}`; });
  });
  // Center
  const cc=cells[7][7];
  cc.style.background='conic-gradient(from 45deg,rgba(230,57,70,.75) 0 90deg,rgba(33,150,243,.75) 90deg 180deg,rgba(76,175,80,.75) 180deg 270deg,rgba(255,214,0,.75) 270deg 360deg)';
  cc.innerHTML='<span style="font-size:calc(var(--bs)*.07);position:relative;z-index:5;pointer-events:none">✦</span>';
}

function buildSidePanels(){
  const wrap=document.getElementById('sidePanels');
  wrap.innerHTML='';
  gameState.activePlayers.forEach((col,i)=>{
    const div=document.createElement('div');
    div.className='pp'; div.id='pp_'+col;
    div.style.setProperty('--pc',CCSS[col]);
    div.style.setProperty('--pr',CRGB[col]);
    const isYou=col===myColor;
    div.innerHTML=`
      <div class="pp-name">P${i+1}${isYou?' <span class="pp-you">YOU</span>':''}</div>
      <div class="pp-color">
        <div class="pp-dot" style="background:${CCSS[col]};box-shadow:0 0 6px ${CCSS[col]}"></div>
        <span style="color:${CCSS[col]}">${CNAME[col]}</span>
      </div>`;
    wrap.appendChild(div);
  });
}

// ══════════════════════════════════════
//  Render game state (every update)
// ══════════════════════════════════════
function renderGameState(){
  if(!gameState)return;
  const gs=gameState;
  const curColor=gs.activePlayers[gs.currentTurn];

  // Turn UI
  document.getElementById('turnDot').style.cssText=
    `background:${CCSS[curColor]};box-shadow:0 0 8px ${CCSS[curColor]}`;
  document.getElementById('turnText').textContent=
    `${CNAME[curColor]}'s Turn${curColor===myColor?' (You)':''}`;
  document.getElementById('diTurn').textContent=
    curColor===myColor?`Your Turn (${CNAME[curColor]})`:`${CNAME[curColor]} Playing`;

  // Dice
  const diceEl=document.getElementById('dice');
  if(gs.diceValue>0) diceEl.textContent=DICE_FACES[gs.diceValue-1];
  const isMyTurn=curColor===myColor && myRole!=='spectate';
  const canRoll=isMyTurn && !gs.diceRolled;
  diceEl.classList.toggle('disabled',!canRoll);
  document.getElementById('diHint').textContent=
    canRoll?'Tap to roll': gs.diceRolled&&isMyTurn?'Choose a piece':'Waiting...';

  // Side panels
  document.querySelectorAll('.pp').forEach(p=>p.classList.remove('active'));
  const ap=document.getElementById('pp_'+curColor);
  if(ap) ap.classList.add('active');

  // Pieces
  document.querySelectorAll('.piece').forEach(p=>p.remove());
  gs.activePlayers.forEach(col=>{
    gs.pieces[col].forEach(piece=>{
      if(piece.finished)return;
      const [row,col2]=getPiecePos(piece,col);
      const cell=document.getElementById(`c${row}_${col2}`);
      if(!cell)return;
      const existing=cell.querySelectorAll('.piece');
      const el=document.createElement('div');
      el.className=`piece ${CCLASS[col]}`;
      el.id=`piece_${col}_${piece.id}`;
      el.textContent=piece.id+1;
      if(existing.length>0){
        el.classList.add('sm');
        const offs=[{top:'8%',left:'8%'},{top:'8%',right:'8%'},{bottom:'8%',left:'8%'},{bottom:'8%',right:'8%'}];
        const o=offs[existing.length]||offs[0];
        el.style.top=''; el.style.left=''; el.style.transform='';
        Object.assign(el.style,o);
      }
      const movable=gs.diceRolled && curColor===col && isMyTurn && canMovePiece(piece,col,gs.diceValue);
      if(movable){
        el.classList.add('movable');
        el.onclick=()=>sendMove(col,piece.id);
      }
      cell.appendChild(el);
    });
  });

  // Win check
  gs.activePlayers.forEach(col=>{
    if(gs.pieces[col]?.every(p=>p.finished)) triggerWin(col);
  });
}

function canMovePiece(piece,col,dv){
  if(piece.finished)return false;
  if(piece.inBase) return dv===6;
  if(piece.homeStretch>=0) return piece.homeStretch+dv<=5;
  return true;
}

function getPiecePos(piece,col){
  if(piece.inBase) return SPAWN[col][piece.id];
  if(piece.homeStretch>=0){
    const hs=HOME_STRETCH[col];
    if(piece.homeStretch>=hs.length) return [7,7];
    return hs[piece.homeStretch];
  }
  return PATH[piece.pathIdx];
}

// ══════════════════════════════════════
//  Actions
// ══════════════════════════════════════
function rollDice(){
  const gs=gameState;
  if(!gs||gs.diceRolled)return;
  const curColor=gs.activePlayers[gs.currentTurn];
  if(curColor!==myColor||myRole==='spectate')return;
  // Animate locally
  const diceEl=document.getElementById('dice');
  diceEl.classList.add('rolling');
  let n=0;
  const iv=setInterval(()=>{
    diceEl.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    if(++n>=10){ clearInterval(iv); diceEl.classList.remove('rolling'); }
  },45);
  send({type:'roll_dice',code:roomCode});
}

function sendMove(col,pieceId){
  send({type:'move_piece',code:roomCode,color:col,pieceId});
}

function copyCode(){
  navigator.clipboard?.writeText(roomCode).then(()=>showToast('Code copied!'))
    .catch(()=>showToast('Code: '+roomCode));
}

function triggerWin(col){
  const ws2=document.getElementById('sWin');
  if(ws2.classList.contains('hidden')){
    ws2.classList.remove('hidden');
    document.getElementById('winTitle').textContent=`🎉 ${CNAME[col].toUpperCase()} WINS!`;
    document.getElementById('winTitle').style.color=CCSS[col];
    for(let i=0;i<60;i++) setTimeout(()=>{
      const c=document.createElement('div'); c.className='conf';
      const cols=[CCSS[col],'#fff','#FFD700','#7c4dff'];
      c.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*4)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),3500);
    },i*25);
  }
}

// ══════════════════════════════════════
//  Utilities
// ══════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),2200);
}

// Init
selectMode('create'); setPlayers(3); connectWS();

// High-refresh-rate hint
(function raf(){ requestAnimationFrame(raf); })();
</script>
